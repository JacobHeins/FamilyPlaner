name: CI

permissions:
  contents: read
  checks: write

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Debug test resources
        run: ls -R src/test/resources

      - name: Build and run tests
        run: ./mvnw verify

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: target/surefire-reports/*.xml
          detailed_summary: true

  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only run on semver tags — not on branch pushes or PRs
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/family-planer
          tags: |
            # Tag with full semver (v1.2.3 → 1.2.3)
            type=semver,pattern={{version}}
            # Tag with major.minor (v1.2.3 → 1.2)
            type=semver,pattern={{major}}.{{minor}}
            # Tag :latest on every version release
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up layer building
          cache-from: type=gha
          cache-to: type=gha,mode=max
